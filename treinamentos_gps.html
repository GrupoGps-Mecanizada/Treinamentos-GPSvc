<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS — Gabarito de Treinamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6fb;--surface:#fff;--card:#fff;--border:#e2e6f0;
  --accent:#2563eb;--green:#059669;--muted:#8a93a8;--text:#1a1f36;
  --highlight:rgba(37,99,235,0.07);--shadow:0 1px 4px rgba(0,0,0,0.07);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;
  background:radial-gradient(circle,rgba(37,99,235,0.05) 0%,transparent 70%);pointer-events:none;z-index:0}

.wrap{max-width:880px;margin:0 auto;padding:52px 20px 80px;position:relative;z-index:1}

/* HEADER */
.header{text-align:center;margin-bottom:44px}
.logo{display:inline-flex;align-items:center;gap:8px;background:rgba(37,99,235,0.08);
  border:1px solid rgba(37,99,235,0.18);border-radius:100px;padding:6px 18px;
  font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
.logo::before{content:'◉';font-size:9px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-family:'Syne',sans-serif;font-size:clamp(26px,5vw,44px);font-weight:800;
  letter-spacing:-.02em;line-height:1.1;color:var(--text);margin-bottom:8px}
h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:15px;font-weight:400;margin-bottom:26px}
.stats{display:flex;justify-content:center;gap:40px}
.stat-n{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--accent)}
.stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:2px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
#searchInput{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:17px 50px 17px 50px;font:500 15px 'Inter',sans-serif;color:var(--text);outline:none;
  box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s}
#searchInput::placeholder{color:var(--muted)}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:var(--border);border:none;border-radius:6px;color:var(--muted);
  cursor:pointer;padding:5px 10px;font-size:11px;display:none;transition:all .15s}
.clear-btn:hover{background:var(--accent);color:#fff}
.clear-btn.show{display:block}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px}
.tag{background:var(--surface);border:1px solid var(--border);border-radius:100px;
  padding:5px 14px;font-size:12px;color:var(--muted);cursor:pointer;
  box-shadow:var(--shadow);transition:all .15s}
.tag:hover{border-color:var(--accent);color:var(--accent);background:var(--highlight)}

/* RESULTS INFO */
.results-info{font-size:13px;color:var(--muted);margin-bottom:16px;height:20px}
.results-info span{color:var(--accent);font-weight:600}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;
  box-shadow:var(--shadow);animation:up .22s ease}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card:hover{border-color:#c7d2fe;box-shadow:0 4px 16px rgba(37,99,235,0.08)}
.card.open{border-color:#93c5fd;box-shadow:0 4px 20px rgba(37,99,235,0.12)}

.card-header{display:flex;align-items:center;gap:14px;padding:18px 22px;cursor:pointer;user-select:none}
.card-idx{flex-shrink:0;width:34px;height:34px;background:var(--highlight);border:1px solid rgba(37,99,235,0.15);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent)}
.card-name{flex:1;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  line-height:1.3;transition:color .15s;min-width:0;color:var(--text)}
.card:hover .card-name,.card.open .card-name{color:var(--accent)}
.card-badge{flex-shrink:0;background:var(--bg);border:1px solid var(--border);
  border-radius:100px;padding:3px 11px;font-size:11px;color:var(--muted);white-space:nowrap}
.card-arrow{flex-shrink:0;color:var(--muted);font-size:13px;transition:transform .25s}
.card.open .card-arrow{transform:rotate(180deg)}

.card-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(0.4,0,0.2,1)}
.card.open .card-body{max-height:3000px}
.card-divider{border:none;border-top:1px solid var(--border);margin:0 22px}
.questions{padding:14px 22px 22px;display:flex;flex-direction:column;gap:9px}

.q{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:14px 16px;transition:border-color .15s}
.q:hover{border-color:#bfdbfe}
.q-text{font-size:13.5px;color:var(--text);line-height:1.55;margin-bottom:9px;font-weight:400}
.q-ans{display:flex;align-items:flex-start;gap:8px;background:rgba(5,150,105,0.06);
  border:1px solid rgba(5,150,105,0.2);border-radius:8px;padding:9px 13px}
.q-check{color:var(--green);font-size:13px;flex-shrink:0;margin-top:1px;font-weight:700}
.q-ans-text{font-size:13.5px;color:#065f46;line-height:1.5;font-weight:500}

/* EMPTY */
.empty{text-align:center;padding:64px 0;color:var(--muted)}
.empty-ico{font-size:44px;margin-bottom:16px;opacity:.5}
.empty h3{font-family:'Syne',sans-serif;font-size:17px;color:var(--text);margin-bottom:6px}

mark{background:rgba(37,99,235,0.15);color:#1d4ed8;border-radius:3px;padding:0 2px}

@media(max-width:600px){
  .stats{gap:24px}
  .card-header{padding:14px 16px;gap:10px}
  .questions{padding:10px 16px 16px}
  h1{font-size:26px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">Grupo GPS</div>
    <h1>Gabarito de <span>Treinamentos</span></h1>
    <p class="sub">Pesquise pelo nome do treinamento e confira as respostas</p>
    <div class="stats">
      <div class="stat"><div class="stat-n">74</div><div class="stat-l">Temas</div></div>
      <div class="stat"><div class="stat-n">369</div><div class="stat-l">Perguntas</div></div>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Buscar treinamento... ex: ética, EPI, saúde, acidente">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕ limpar</button>
  </div>

  <div class="tags" id="tags"></div>
  <div class="results-info" id="info"></div>
  <div id="list"></div>
</div>

<script>
const D = {"DIA INTERNACIONAL DA MULHER":[{"p":"1) Em qual dia é comemorado o dia internacional da mulher?","r":"8 de março."},{"p":"2) No treinamento citamos alguns exemplos de papéis que as mulheres desempenham. Como as mulheres realizam todos esses papeis?","r":"Com dedicação e empenho."},{"p":"3) Como as mulheres agem quando se deparam com um desafio na carreira?","r":"Continuam lutando, com estratégia, disciplina e persistência."},{"p":"4) As mulheres possuem diversas características, como por exemplo, a criatividade, flexibilidade, multifuncionalidade, persistência e a perspicácia, porém a mais importante de todas elas é:","r":"Ser mulher."},{"p":"5) Quando uma mulher reconhece a sua força, ela se torna:","r":"Uma fonte inesgotável de inspiração."}],"USO RACIONAL DA ÁGUA_SUSTENTABILIDADE":[{"p":"1) Qual a porcentagem do volume de água da Terra próprio para consumo?","r":"Apenas 1%."},{"p":"2) Quantos litros de água disperdiçamos ao não fechar a torneira enquanto escovamos os dentes?","r":"25 litros."},{"p":"3) Qual o tempo ideial de banho para economizar água?","r":"De 5 a 10 minutos no máximo."},{"p":"4) Devemos utilizar a máquina de lavar roupa e louça apenas quando:","r":"Tiver roupa e louça suficiente para ocupar a capacidade total das máquinas."},{"p":"5) Não podemos mudar a atitude das pessoas, mas podemos mudar:","r":"A nossa percepção sobre as situações."}],"MARÇO LILÁS - PREVENÇÃO DO CÂNCER DO COLO DO ÚTERO":[{"p":"1) ASSINALE A ALTERNATIVA CORRETA. O CÂNCER DO COLO DO ÚTERO É:","r":"O TERCEIRO TIPO DE CÂNCER MAIS COMUM ENTRE AS MULHERES NO BRASIL."},{"p":"2) QUAL É O PRINCIPAL FATOR RELACIONADO AO DESENVOLVIMENTO DO CÂNCER DO COLO DO ÚTERO?","r":"INFECÇÃO PELO HPV."},{"p":"3) QUAL DAS ALTERNATIVAS ABAIXO MOSTRA UM SINTOMA POSSÍVEL DO CÂNCER DO COLO DO ÚTERO?","r":"SANGRAMENTO VAGINAL ANORMAL."},{"p":"4) SOBRE A PREVENÇÃO DO CÂNCER DO COLO DO ÚTERO, É CORRETO AFIRMAR QUE:","r":"A VACINA CONTRA O HPV É OFERECIDA GRATUITAMENTE PELO SUS PARA MENINAS E MENINOS DE 9 A 14 ANOS."},{"p":"5) POR QUE A PARTICIPAÇÃO DOS HOMENS É IMPORTANTE NA PREVENÇÃO DO CÂNCER DO COLO DO ÚTERO?","r":"TODAS AS ALTERNATIVAS ANTERIORES."}],"DIREITOS HUMANOS_RESPEITO NAS RELAÇÕES":[{"p":"1) O que são Direitos Humanos?","r":"Direitos Humanos é um conjunto de direitos reconhecidos como os mais básicos e imprescindíveis para a vida humana no planeta."},{"p":"2) Quais são as pessoas que podem se beneficiar destes direitos?","r":"Todas as pessoas independentemente da sua cor, gênero, nacionalidade, religião, orientação sexual, estes direitos são válidos desde o nascimento de todos os indivíduos;"},{"p":"3) No Brasil, os direitos são assegurados através da:","r":"Constituição Federal;"},{"p":"4) Qual é o contato do Disque Direitos Humanos e qual seu horário de funcionamento?","r":"N°100 e ele funciona 24h;"},{"p":"5) Qual o nome da lei vigorada para violência doméstica contra mulher?","r":"Lei Maria da Penha;"}],"DIA NACIONAL DE COMBATE AO ALCOOLISMO":[{"p":"1) QUAL É A DATA EM QUE O DIA NACIONAL DE COMBATE AO ALCOOLISMO É CELEBRADO NO BRASIL?","r":"18 DE FEVEREIRO."},{"p":"2) ASSINALE ABAIXO A ALTERNATIVA CORRETA. O TREINAMENTO SUGERE QUE O ALCOOLISMO:","r":"PODE PREJUDICAR NÃO APENAS O INDIVÍDUO, MAS TAMBÉM A SOCIEDADE COMO UM TODO."},{"p":"3) QUAL É A SUGESTÃO CENTRAL DO TREINAMENTO SOBRE COMO A SOCIEDADE PODE AJUDAR NO COMBATE AO ALCOOLISMO?","r":"SUBSTITUINDO A EMPATIA PELA COMPREENSÃO E PROMOVENDO UM AMBIENTE DE APOIO."},{"p":"4) QUAIS SÃO ALGUMAS DAS CONSEQUÊNCIAS MENCIONADAS NO TREINAMENTO SOBRE O ABUSO DE ÁLCOOL?","r":"PROBLEMAS FAMILIARES E PREJUÍZOS NO DESEMPENHO ACADÊMICO."},{"p":"5) O QUE É ENFATIZADO COMO CRUCIAL PARA CONSTRUIR UMA REDE DE APOIO EFICAZ PARA AQUELES QUE ENFRENTAM O ALCOOLISMO?","r":"COMPREENDER QUE A DEPENDÊNCIA QUÍMICA É TRATÁVEL E OFERECER APOIO EMOCIONAL."}],"TRABALHO ANÁLOGO À ESCRAVIDÃO":[{"p":"1) ASSINALE A ALTERNATIVA CORRETA. DE ACORDO COM O MINISTÉRIO DO TRABALHO E EMPREGO, O NÚMERO DE RESGATES DE PESSOAS EM SITUAÇÃO ANÁLOGA À ESCRAVIDÃO:","r":"TEM AUMENTADO A CADA ANO."},{"p":"2) QUAL É A DEFINIÇÃO DE TRABALHO ANÁLOGO À ESCRAVIDÃO?","r":"\"É CARACTERIZADO PELA SUBMISSÃO DE ALGUÉM A TRABALHOS FORÇADOS OU A JORNADA EXAUSTIVA, QUER SUJEITANDO-O A CONDIÇÕES DEGRADANTES DE TRABALHO\"."},{"p":"3) ASSINALE QUAL DAS CARACTERÍSTICAS DO TRABALHO ANÁLOGO À ESCRAVIDÃO ABAIXO É FALSA:","r":"OPÇÃO QUANTO À MODALIDADE DE TRABALHO HÍBRIDO."},{"p":"4) ASSINALE QUAL É A CONDIÇÃO USUAL DAS PESSOAS QUE ENFRENTAM A SITUAÇÃO DE TRABALHO ANÁLOGO À ESCRAVIDÃO:","r":"SÃO PESSOAS EM CONDIÇÕES DE ALTA VULNERABILIDADE SOCIOECONÔMICA, SEJAM ELAS JOVENS, IDOSOS, HOMENS E/OU MULHERES."},{"p":"5) QUAL DAS ALTERNATIVAS ABAIXO NÃO REPRESENTA UM CANAL DE DENÚNCIA DE CASOS DE TRABALHO ANÁLOGO À ESCRAVIDÃO?","r":"ONG - ORGANIZAÇÃO DAS NAÇÕES GERAIS."}],"FEVEREIRO ROXO - LÚPUS, ALZHEIMER E FIBROMIALGIA":[{"p":"1) O \"FEVEREIRO ROXO\" DESTACA TRÊS CONDIÇÕES DE SAÚDE. QUAIS SÃO ELAS?","r":"LÚPUS, FIBROMIALGIA E ALZHEIMER."},{"p":"2) SOBRE O LÚPUS, É CORRETO AFIRMAR QUE:","r":"É UMA DOENÇA AUTOIMUNE QUE AFETA PRINCIPALMENTE MULHERES JOVENS, ENTRE 20 E 40 ANOS."},{"p":"3) QUAIS DOS SEGUINTES SINTOMAS SÃO CARACTERÍSTICOS DA FIBROMIALGIA?","r":"DORES GENERALIZADAS, FADIGA E ALTERAÇÕES DE HUMOR."},{"p":"4) ASSINALE ABAIXO A ALTERNATIVA CORRETA. O ALZHEIMER É CARACTERIZADO POR:","r":"LAPSOS DE MEMÓRIA, DESORIENTAÇÃO E PERDA GRADUAL DE AUTONOMIA."},{"p":"5) QUAL MENSAGEM PRINCIPAL O \"FEVEREIRO ROXO\" BUSCA TRANSMITIR?","r":"A IMPORTÂNCIA DE BUSCAR INFORMAÇÃO E CONSCIENTIZAÇÃO SOBRE LÚPUS, FIBROMIALGIA E ALZHEIMER."}],"LGPD – LEI GERAL DE PROTEÇÃO DE DADOS":[{"p":"1) O que significa LGPD?","r":"Lei Geral de Proteção de Dados Pessoais."},{"p":"2) Assinale o item que contém dados pessoais que devem ser protegidos por Lei.","r":"Nome completo, CPF, endereço e telefone."},{"p":"3) O que o colaborador da GPS deve fazer com os dados pessoais a que tiver acesso?","r":"Utilizar somente nos sistemas autorizados pelo seu empregador."},{"p":"4) Qual o meio utilizado para obter informações sobre os dados pessoais de colaboradores da GPS?","r":"Através do e-mail lgpd@gpssa.com.br"},{"p":"5) Qual o nome do órgão responsável por fiscalizar o cumprimento da Lei de Proteção de Dados?","r":"Autoridade Nacional de Proteção de Dados."}],"CÓDIGO DE ÉTICA E CONDUTA":[{"p":"1) Quais locais você pode acessar o código de Ética e Conduta?","r":"No Site do Grupo GPS e aplicativo GPSvc."},{"p":"2) Para quem se aplica o Código de Ética e Conduta?","r":"Aplicável a todos, sem distinção de área, nível hierárquico ou tipo de relação com o Grupo GPS."},{"p":"3) Para que serve o código de conduta?","r":"O Código de Ética e Conduta estabelece os princípios éticos e as normas de conduta, de forma a orientar as nossas relações internas e externas, com base em nossa Missão, Visão e Valores."},{"p":"4) Na relação com os Colaboradores e Ambiente de Trabalho, qual alternativa está correta?","r":"Todas as alternativas acima estão corretas."},{"p":"5) Em caso de constatação de violação de normas e procedimentos, qual o canal pode ser acionado?","r":"O Canal de ética pode ser acessado pelo telefone 0800 049 4200 ou por meio do site www.canaldeetica.com.br/grupogps/."}],"O QUE É SEGURANÇA DO TRABALHO_ACIDENTE ZERO":[{"p":"1) QUAL É O PRINCIPAL OBJETIVO DESSA PÍLULA DE CONHECIMENTO?","r":"PROMOVER O COMPORTAMENTO SEGURO."},{"p":"2) O QUE É SEGURANÇA PATRIMONIAL?","r":"REFERE-SE À PROTEÇÃO DE BENS MATERIAIS, PROPRIEDADES, E ATIVOS DE UMA ORGANIZAÇÃO OU PESSOA."},{"p":"3) O QUE É SEGURANÇA DO TRABALHO?","r":"DIZ RESPEITO À PROTEÇÃO DA INTEGRIDADE FÍSICA DOS COLABORADORES NO EXERCÍCIO DE SUAS FUNÇÕES, EVITANDO OU MINIMIZANDO A POSSIBILIDADE DE OCORRÊNCIA DE ACIDENTES OU DOENÇAS DO TRABALHO."},{"p":"4) ASSINALE ABAIXO A ALTERNATIVA CORRETA QUE DIZ RESPEITO ÀS ATIVIDADES QUE UM PROFISSIONAL DE SEGURANÇA DO TRABALHO FAZ PARA GARANTIR A SEGURANÇA DOS COLABORADORES:","r":"REALIZAM INSPEÇÕES REGULARES DOS EQUIPAMENTOS, DESENVOLVEM PROGRAMAS DE TREINAMENTO PARA PASSAR PROCEDIMENTOS CORRETOS, IMPLEMENTAM POLÍTICAS DE SEGURANÇA, FAZEM AVALIAÇÃO DOS RISCOS, ETC."},{"p":"5) PARA GARANTIR A EFICÁCIA DA SEGURANÇA DO TRABALHO, O GRUPO GPS SEGUE QUAIS PREMISSAS:","r":"OS NOSSOS COLABORADORES SÃO NOSSO MAIOR VALOR; A SEGURANÇA E SAÚDE NO TRABALHO É UM BEM INEGOCIÁVEL; EM RELAÇÃO AO MEIO AMBIENTE DEVEMOS CUIDAR, PRESERVAR E EDUCAR."}],"SEGURANÇA DA INFORMAÇÃO":[{"p":"1) PELO QUE A SEGURANÇA DA INFORMAÇÃO É RESPONSÁVEL?","r":"MANTER A SEGURANÇA DE DADOS, CONSCIENTIZAR E ORQUESTRAR O PROCESSO DE RECUPERAÇÃO EM CASO DE DESASTRES."},{"p":"2) A SEGURANÇA DA INFORMAÇÃO É COMPOSTO POR QUANTOS PILARES?","r":"3 PILARES."},{"p":"3) QUAIS SÃO OS COMPONENTES DO PRIMEIRO PILAR DE SEGURANÇA?","r":"CONFIDENCIALIDADE, INTEGRIDADE E DISPONIBILIDADE."},{"p":"4) COMO ADQUIRIR BOAS PRÁTICAS DE SEGURANÇA DENTRO DA COMPANHIA?","r":"ESTEJA ATENTO AO “CÓDIGO DE ÉTICA E CONDUTA”, ALÉM DOS PROCESSOS DE SEGURANÇA ESTABELECIDOS PELA COMPANHIA."},{"p":"5)  QUAL E-MAIL DEVE SER USADO PARA REPORTAR SUSPEITAS OU ATAQUES CIBERNÉTICOS?","r":"(VCSEGURO@GPSSA.COM.BR)."}],"JANEIRO BRANCO - CONSCIENTIZAÇÃO SOBRE SAÚDE MENTAL":[{"p":"1) O QUE REALMENTE SIGNIFICA TER SAÚDE MENTAL?","r":"ORGANIZAR EMOÇÕES E MANTER EQUILÍBRIO MESMO EM MOMENTOS DE CRISE."},{"p":"2) POR QUE O MÊS DE JANEIRO FOI ESCOLHIDO PARA A CAMPANHA JANEIRO BRANCO?","r":"PORQUE SIMBOLIZA RECOMEÇO, RENOVAÇÃO E PLANEJAMENTO."},{"p":"3) O QUE O “BRANCO” SIMBOLIZA NA CAMPANHA?","r":"UMA FOLHA EM BRANCO, REPRESENTANDO A CHANCE DE REESCREVER VIVÊNCIAS E QUEBRAR TABUS."},{"p":"4) QUAL É A PRINCIPAL MENSAGEM QUE A CAMPANHA BUSCA TRANSMITIR SOBRE PEDIR AJUDA?","r":"PEDIR AJUDA NÃO É FRAQUEZA, MAS CORAGEM E MATURIDADE."},{"p":"5) A “SÍNDROME DE BURNOUT” É MENCIONADA NO TREINAMENTO COMO:","r":"UM ADOECIMENTO CAUSADO PELA SOBRECARGA, CUJOS CASOS AUMENTARAM SIGNIFICATIVAMENTE NOS ÚLTIMOS ANOS."}],"INTELIGÊNCIA EMOCIONAL_SAÚDE MENTAL":[{"p":"1) O que é inteligência emocional?","r":"É a habilidade para conhecer os seus próprios sentimentos e ações diante da vida."},{"p":"2) No que a inteligência emocional auxilia?","r":"Através dela você gerência os seus sentimentos, controla reações, potencializa aspectos positivos da própria personalidade."},{"p":"3) O que você ganha ao desenvolver a inteligência emocional?","r":"Você cria relacionamentos mais saudáveis e consegue tomar decisões mais assertivas."},{"p":"4) O que é necessário para desenvolver a inteligência emocional?","r":"Autoconsciência e autorregulação das emoções."},{"p":"5) Cite uma prática para desenvolver a inteligência emocional.","r":"Ter empatia."}],"DEZEMBRO VERMELHO: LUTA CONTRA AIDS":[{"p":"1) QUAL É O PRINCIPAL OBJETIVO DO DEZEMBRO VERMELHO?","r":"PROMOVER A CONSCIENTIZAÇÃO SOBRE A AIDS E COMBATER O ESTIGMA ASSOCIADO AO HIV."},{"p":"2) QUAIS SÃO AS PRINCIPAIS VIAS DE TRANSMISSÃO DO HIV MENCIONADAS NO TREINAMENTO?","r":"COMPARTILHAMENTO DE AGULHAS, TRANSMISSÃO VERTICAL E RELAÇÕES SEXUAIS SEM PROTEÇÃO."},{"p":"3) COMO A SOCIEDADE PODE AJUDAR NA LUTA CONTRA A AIDS?","r":"UNINDO-SE PARA PROMOVER A EDUCAÇÃO, TESTAGEM REGULAR E COMBATE À DISCRIMINAÇÃO."},{"p":"4) POR QUE O ESTIGMA AINDA REPRESENTA UM DESAFIO NA LUTA CONTRA A AIDS?","r":"PORQUE IMPEDE O ACESSO AO DIAGNÓSTICO PRECOCE, TRATAMENTO E APOIO NECESSÁRIO."},{"p":"5) QUAL É A IMPORTÂNCIA DA EDUCAÇÃO, ESPECIALMENTE ENTRE OS JOVENS, NA PREVENÇÃO DO HIV?","r":"PARA GARANTIR QUE AS FUTURAS GERAÇÕES ESTEJAM EQUIPADAS COM O CONHECIMENTO NECESSÁRIO PARA SE PROTEGEREM E APOIAREM OS OUTROS."}],"FUNÇÃO E IMPORTÂNCIA DA ÁGUA_ALIMENTAÇÃO SAUDÁVEL":[{"p":"1) Qual a porcentagem de água no peso de uma criança?","r":"80% do peso corporal."},{"p":"2) Qual a porcentagem de água no peso de um adulto?","r":"60% do peso corporal."},{"p":"3) Qual a porcentagem aproximada de água na composição da urina?","r":"95% da composição da urina."},{"p":"4) O que significa sentir sede para o nosso corpo?","r":"É um sinal de desidratação."},{"p":"5) O que podemos co plique o sentido do que está dizendo, para não a deixe confusa."},{"p":"2) Com relação ao que vimos no treinamento, assinale qual das frases abaixo está INCORRETA:","r":"O Brasil é considerado um dos países mais atrasados do mundo no que diz respeito a legislação para PcD."},{"p":"3) Segundo o novo modelo psicossocial, baseado na Lei Brasileira de Inclusão, qual o prazo de impedimento de natureza física, mental, intelectual ou sensorial (auditiva e visual)?","r":"De longo prazo."},{"p":"4) As empresas precisam cumprir a Lei de Cotas (Lei 8.213/91), que está presente no artigo 93. Para qual categoria de pessoas se destina essa Lei?","r":"Pessoas com deficiência ou pessoas reabilitadas pelo INSS."},{"p":"5) Qual a terminologia correta para ser utilizada em referência às pessoas com perda parcial ou total de audição?","r":"Pessoa com deficiência auditiva."}],"VIOLÊNCIA CONTRA A MULHER_RESPEITO NAS RELAÇÕES":[{"p":"1) O que é violência contra mulher?","r":"É qualquer ação ou conduta baseada no gênero que cause morte, dano ou sofrimento físico, sexual ou psicológico a mulher"},{"p":"2) O que caracteriza violência física?","r":"Condutas que ofendem a integridade e a saúde corporal da mulher"},{"p":"3) O que caracteriza violência sexual?","r":"Tentativas ou atos sexuais que sejam realizados sem o consentimento da mulher."},{"p":"4) Qual é o contato da central de atendimento à Mulher?","r":"180"},{"p":"5) Qual é a Lei de proteção a violência contra a mulher que foi criada em 2006?","r":"Lei Maria da Penha"}],"DIFERENÇA ENTRE PERIGO E RISCO_ACIDENTE ZERO":[{"p":"1) QUAL A DEFINIÇÃO DE \"PERIGO\" DE ACORDO COM O TREINAMENTO?","r":"A FONTE OU SITUAÇÃO COM POTENCIAL PARA PROVOCAR DANOS."},{"p":"2) O QUE É RISCO, DE ACORDO COM O TREINAMENTO?","r":"A COMBINAÇÃO DA PROBABILIDADE E DA CONSEQUÊNCIA DE UM EVENTO PERIGOSO."},{"p":"3) QUAL É O PRIMEIRO PASSO QUE O TREINAMENTO MOSTRA PARA ELIMINAR PERIGOS E REDUZIR OS RISCOS?","r":"AVALIAR E IDENTIFICAR TODOS OS PERIGOS PRESENTES NA FÁB r":"Exercer o respeito a todas as pessoas."}],"DILUIÇÃO DE PRODUTOS QUÍMICOS_INFRA":[{"p":"1) Em qual processo de diluição de produtos químicos utilizamos a válvula pump?","r":"No processo de diluição manual."},{"p":"2) Para que serve a Tabela de Diluição?","r":"Para saber a proporção correta de diluição específica de cada produto."},{"p":"3) O que podemos encontrar no documento FISPQ (Ficha de Informação e Segurança de Produtos Químicos)?","r":"Todas estão corretas."},{"p":"4) Escolha a alternativa abaixo que está ERRADA sobre a Diluição de Produtos Químicos","r":"Ao diluir, não precisa usar EPIs."},{"p":"5) Um produto químico quando diluído de forma incorreta pode:","r":"Todas alternativas acima."}],"CORDÃO DE GIRASSOL":[{"p":"1) EM QUAL ANO FOI SANSIONADA A LEI QUE FORMALIZA O USO DO CORDÃO COM DESENHO DE GIRASSÓIS COMO IDENTIFICAÇÃO DE PESSOAS COM DEFICIÊNCIAS OCULTAS?","r":"NO ANO DE 2023."},{"p":"2) O QUE SÃO DEFICIÊNCIAS OCULTAS?","r":"SÃO TODAS AS DEFICIÊNCIAS QUE NÃO SÃO POSSÍVEIS DE SEREM IDENTIFICADAS FISICAMENTE, MESMO QUE ESTAS DOENÇAS TENHAM ALGUMAS CARACTERÍSTICAS ESPECÍFICAS."},{"p":"3) ASSINALE ABAIXO A ALTERNATIVA QUE MOSTRE ALGUNS EXEMPLOS DE DEFICIÊNCIAS OCULTAS:","r":"TRANSTORNO DO ESPECTRO AUTISTA (TEA), PESSOAS SURDAS, FOBIAS EXTREMAS E DOENÇAS CRÔNICAS."},{"p":"4) O QUE O USO DO CORDÃO DE GIRASSÓIS TRAZ?","r":"MAIS EMPATIA E AUXÍLIO NO RECONHECIMENTO DA CONDIÇÃO DAQUELA PESSOA, ELE \"REPRESENTA UM IMPORTANTE PASSO PARA A INCLUSÃO E CONSCIENTIZAÇÃO\"."},{"p":"5) O USO DO CORDÃO DE GIRASSÓIS É OBRIGATÓRIO?","r":"O USO DO SÍMBOLO DO CORDÃO DE GIRASSOL É OPCIONAL E A SUA AUSÊNCIA NÃO PREJUDICA NO EXERCÍCIO DE DIREITOS E GARANTIAS PREVISTOS EM LEIS."}],"JUNHO LARANJA - CONSCIENTIZAÇÃO SOBRE A ANEMIA E LEUCEMIA":[{"p":"1) O QUE CARACTERIZA A ANEMIA?","r":"A REDUÇÃO DOS GLÓBULOS VERMELHOS OU DA HEMOGLOBINA."},{"p":"2) ENTRE OS SINTOMAS ABAIXO, QUAL DELES SE ENCAIXA NA CONDIÇÃO DA ANEMIA?","r":"FADIGA CONSTANTE E PALIDEZ NA PELE."},{"p":"3) QUAL É O DO PELO TELEFONE 0800 049 4200 OU PELO SITE (HTTPS://WWW.CANALDEETICA.COM.BR/GRUPOGPS/)."}],"MAIO AMARELO - SEGURANÇA NO TRÂNSITO":[{"p":"1) QUAL É O OBJETIVO PRINCIPAL DO MOVIMENTO MAIO AMARELO?","r":"CONSCIENTIZAR SOBRE SEGURANÇA NO TRÂNSITO."},{"p":"2) QUANDO A ONU DECRETOU A DÉCADA DE AÇÃO PARA SEGURANÇA NO TRÂNSITO, QUE INSPIROU A CRIAÇÃO DO MAIO AMARELO?","r":"2011."},{"p":"3) QUAL É O SIGNIFICADO DA COR AMARELA PARA O MOVIMENTO MAIO AMARELO?","r":"SIMBOLIZA ATENÇÃO E ADVERTÊNCIA NO TRÂNSITO."},{"p":"4) SEGUNDO OS DADOS, QUANTAS PESSOAS MORREM EM ACIDENTES DE TRÂNSITO EM MÉDIA POR ANO NO BRASIL?","r":"MAIS DE 30 MIL."},{"p":"5) QUAL É UMA MEDIDA SIMPLES QUE PODE REDUZIR EM ATÉ 50% O RISCO DE MORTE EM CASO DE ACIDENTE DE TRÂNSITO?","r":"USO DO CINTO DE SEGURANÇA."}],"COMO DESACELERAR?":[{"p":"1) Atualmente, mesmo realizando muitas tarefas no dia, costumamos sentir algumas sensações ruins, como:","r":"Frustração, cansaço, desgaste físico, desgaste psicológico e insatisfação com a vida."},{"p":"2) Não devemos chegar no limite do desgaste, para isso é necessário:","r":"Conhecer nossas limitações e pontos de destaque."},{"p":"3) Conhecer suas limitações e pontos de destaque, vai te ajudar a encontrar o quê?","r":"O equilíbrio necessário para se organizar e definir melhor suas metas de forma que sejam possíveis de alcançar e em seguida comemora-las."},{"p":"4) Quais dicas podem te auxiliar a desacelerar?","r":"Definir prioridades; organizar atividades de forma que possa realiza-las."},{"p":"5) Qual dica NÃO pode te auxiliar a desacelerar?","r":"Finalize todas as atividades em apenas um dia, mesmo que fique até mais tarde."}],"POLÍTICA SGI":[{"p":"1) A política de Gestão Integrada do Grupo GPS é aplicada para quais Colaboradores?","r":"Todos os Colaboradores do Grupo GPS"},{"p":"2) Quantas diretrizes foram citadas no vídeo?","r":"Oito"},{"p":"3) Complete a frase. PRESERVAR A SUA RENTABILIDADE ATRAVÉS","r":"Através do cumprimento de metas econômicas"},{"p":"4) Baseado o que podemos ter para evitar o assédio sexual no trabalho:","r":"Não fazer comentários ou perguntas que possam ser indelicadas e até mesmo abordagens que possam caracterizar intimidade não adequada ao ambiente de trabalho."}],"MARÇO LILÁS_PREVENÇÃO DO COLO DE ÚTERO":[{"p":"1) Qual o mês de conscientização sobre a importância de se prevenir contra o câncer do colo do útero?","r":"Março."},{"p":"2) Qual o objetivo da campanha?","r":"Reduzir o número de mortes por câncer de colo do útero e promover a prevenção desde cedo."},{"p":"3) Quando a doença está em estágio avançado, ela começa a apresentar alguns sintomas como:","r":"Dor abdominal associada a problemas intestinais e urinários, sangramento vaginal, secreções vaginais anormais, menstruação irregular etc."},{"p":"4) Qual a principal forma de prevenção e identificação do câncer de colo de útero?","r":"Exame preventivo e Papanicolau, no qual é feita a coleta de células do colo do útero para detectar se há alguma infecção ou variação nesses tecidos."},{"p":"5) Quando deve ser realizado o exame de Papanicolau?","r":"O Papanicolau deve ser feito de 3 em 3 anos, por todas as mulheres com idades acima de 25 anos e que possuem vida sexual ativa."}],"QUALIDADE DE VIDA":[{"p":"1) QUAL É UM DOS FATORES DE RISCO PARA O DESENVOLVIMENTO DE DOENÇAS, DE ACORDO COM O TREINAMENTO?","r":"ALIMENTAÇÃO RICA EM GORDURAS."},{"p":"2) COMO LIDAR COM OSCILAÇÕES EMOCIONAIS?","r":"ENCARAR AS COISAS COM BOM HUMOR, TER MUITA PACIÊNCIA E CONTROLAR O ESTRESSE."},{"p":"3) QUAL É O PERÍODO RECOMENDADO PARA A PRÁTICA DE EXERCÍCIOS FÍSICOS?","r":"PELO MENOS 30 MINUTOS, 5 VEZES POR SEMANA."},{"p":"4) QUAL DOS SEGUINTES FATORES NÃO CONTRIBUI PARA UMA VIDA SAUDÁVEL?","r":"SEDENTARISMO."},{"p":"5) O QUE É DESTACADO COMO UM BENEFÍCIO DE SE PREOCUPAR COM A QUALIDADE DE VIDA?","r":"AUMENTO DA PRODUTIVIDADE NO TRABALHO."}],"JANEIRO BRANCO":[{"p":"1) Qual o objetivo da Campanha Janeiro Branco?","r":"Chamar a atenção da humanidade para as questões e necessidades relacionadas à Saúde Mental e Emocional das pessoas."},{"p":"2) Quais cuidados devemos ter no nosso dia a dia para preservarmos a nossa saúde mental?","r":"Fazer exercícios físicos, leitura, ações compartilhadas de cuidado, manter ativa uma rede de apoio socioafetiva e etc."},{"p":"3) O que o Janeiro Branco traz como inspiração?","r":"Inspira as pessoas a fazerem reflexões acerca das suas vidas."},{"p":"4) Por qual motivo a cor branca foi escolhida para representar a campanha Janeiro Branco?","r":"Por representar “folhas ou telas em branco” sobre as quais podemos projetar, escrever ou desenhar expectativas, desejos, histórias ou mudanças."},{"p":"5) Segundo a OMS (Organização Mundial de Saúde) qual é a definição de saúde?","r":"Saúde é um estado de completo bem-estar físico, mental e social, e não apenas a ausência de doença."}],"LIDERANÇA INCLUSIVA":[{"p":"1) QUAL É O PRINCIPAL OBJETIVO DA LIDERANÇA INCLUSIVA?","r":"TODAS AS ALTERNATIVAS ESTÃO CORRETAS."},{"p":"2) QUAIS SÃO OS BENEFÍCIOS DA LIDERANÇA INCLUSIVA?","r":"TODAS AS ALTERNATIVAS ESTÃO CORRETAS."},{"p":"3) QUAIS SÃO OS DESAFIOS DA LIDERANÇA INCLUSIVA?","r":"TODAS AS ALTERNATIVAS ESTÃO CORRETAS."},{"p":"4) QUAL É A PRINCIPAL DIFERENÇA ENTRE LIDERANÇA INCLUSIVA E LIDERANÇA TRADICIONAL?","r":"A LIDERANÇA INCLUSIVA É MAIS FOCADA NA DIVERSIDADE E NA INCLUSÃO, ENQUANTO A LIDERANÇA TRADICIONAL É MAIS FOCADA NA EFICIÊNCIA E NA PRODUTIVIDADE."},{"p":"5) QUAL É A PRINCIPAL VANTAGEM DA LIDERANÇA INCLUSIVA PARA AS EMPRESAS?","r":"TODAS AS ALTERNATIVAS ESTÃO CORRETAS."}],"SEGURANÇA ESTILO DE VIDA_CRIMINOSO OPORTUNISTA":[{"p":"1) Podemos definir oportunidade como:","r":"Situação favorável para a realização de uma ação."},{"p":"2) O criminoso oportunista age de que maneira?","r":"Não tem o alvo determinado e age na oportunidade."},{"p":"3) O que podemos fazer para evitarmos uma abordagem do criminoso oportunista?","r":"Ficar sempre atento, a fim de detectar atitudes suspeitas."},{"p":"4) Como podemos aumentar a nossa segurança?","r":"Procurando conhecer melhor de que forma agem os criminosos."},{"p":"5) Os fatores que levam à realização de uma ação criminosa, são a motivação, técnica e oportunidade. Em qual desse fatores podemos interferir para dificultar a ação do criminoso?","r":"Oportunidade."}],"CAMPANHA NOVEMBRO AZUL":[{"p":"1) Qual o objetivo da campanha de Novembro Azul?","r":"Campanha com o objetivo de alertar a sociedade sobre o diagnóstico precoce do câncer de próstata, além de ressaltar a importância de olhar com atenção para a saúde."},{"p":"2) Sobre o câncer de próstata, podemos afirmar que:","r":"Câncer de próstata é o tumor que afeta a próstata"},{"p":"3) Quais os principais sintomas do câncer de próstata?","r":"Dores ao urinar, vontade de urinar com frequência, presença de sangue/sêmen, dor óssea, mas pode não ter nenhum sintoma por isso a importância dos exames."},{"p":"4) Quais são os fatores de maior risco?","r":"Idade acima de 60 anos, histórico familiar, homens negros sofrem maior incidência e obesidade."},{"p":"5) Sobre a prevenção podemos afirmar:","r":"É importante que o homem a partir de 45 anos realize regularmente os exames PSA e exame retal."}],"CONCENTRAÇÃO E FOCO PARA EVITAR ACIDENTES":[{"p":"1)  POR QUE A CONCENTRAÇÃO É CONSIDERADA UMA HABILIDADE VITAL NO AMBIENTE DE TRABALHO?","r":"MINIMIZA OS RISCOS DE ERROS E ACIDENTES."},{"p":"2) QUAL É A IMPORTÂNCIA DE CONHECER OS RISCOS POTENCIAIS NO AMBIENTE DE TRABALHO?","r":"PARA EVITAR CONTRATEMPOS."},{"p":"3) QUAL DAS SEGUINTES AÇÕES É UMA DICA PRÁTICA PARA MANTER A CONCENTRAÇÃO?","r":"DEFINIR PRIORIDADES PARA AS TAREFAS DIÁRIAS."},{"p":"4) POR QUE O TREINAMENTO CONTÍNUO É MENCIONADO COMO IMPORTANTE NO TREINAMENTO?","r":"PORQUE AUMENTA A CONFIANÇA E A CAPACIDADE DE TOMAR DECISÕES CONSCIENTES."},{"p":"5)  QUAL É A IMPORTÂNCIA DE MANTER UM AMBIENTE DE TRABALHO ORGANIZADO?","r":"CONTRIBUI PARA UMA MENTE CLARA E FOCADA."}],"VALORIZAÇÃO DA VIDA":[{"p":"1) Em casos de crise, qual é a melhor atitude a ser tomada?","r":"Busque ajuda, sem ter vergonha"},{"p":"2) O que a depressão afeta?","r":"Afeta negativamente como você se sente, como você pensa ou age"},{"p":"3) O que é transtorno Bipolar?","r":"São momentos de tristeza profunda, alternada com uma agitação extrema"},{"p":"4) Por que é importante deixar as pessoas confortáveis para falar sobre seus sentimentos?","r":"Pois quando se sentem confortáveis, incentivamos elas a pedirem ajuda em seus momentos de fraqueza"},{"p":"5) Qual é o telefone de contato do CVV (centro de valorização da vida)?","r":"188"}],"CUIDADO COM AS MÃOS NO TRABALHO":[{"p":"1) A MAIORIA dos acidentes acontece por qual motivo?","r":"A maioria ocorre por descuido, falta de atenção, tédio e descumprimento das normas de segurança."},{"p":"2) Quais são as situações mais comuns de acidente com as mãos?","r":"Situações mais comuns de lesão ocorrem com ferramentas de corte, uso incorreto de ferramentas, uso de ferramentas quebradas, uso de joias, contato com áreas quentes, máquinas rotativas e cansaço."},{"p":"3) De acordo com o treinamento, assinale a alternativa CORRETA:","r":"Não é difícil se prevenir de acidentes, na maioria dos casos com atenção e bom senso é possível se prevenir."},{"p":"4) Por que existem tipos de luvas diferentes para proteção?","r":"Porque para cada tipo de trabalho existe uma luva projetada para proteger de um risco específico e elas podem evitar cortes, queimaduras, abrasões e contato com produtos químicos."},{"p":"5) Se ocorrer algum acidente ou incidente no trabalho, o que deve ser feito?","r":"Deve comunicar IMEDIATAMENTE o Líder e Técnico de Segurança."}],"CONCEITO 5S":[{"p":"1) O QUE É 5S?","r":"É UMA METODOLOGIA DE GESTÃO QUE VISA MELHORAR A ORGANIZAÇÃO, LIMPEZA E EFICIÊNCIA NO LOCAL DE TRABALHO."},{"p":"2) QUAL É O PRIMEIRO SENSO DO CONCEITO 5S?","r":"SEIRI - SENSO DE UTILIZAÇÃO"},{"p":"3) QUAL EXEMPLO REPRESENTA O SENSO DE UTILIZAÇÃO.","r":"DEIXAR NA MESA APENAS O QUE É NECESSÁRIO NO DIA A DIA."},{"p":"4) O QUE REPRESENTA O TERCEIRO CONCEITO DA METODOLOGIA 5S?","r":"REPRESENTA O SENSO DE LIMPEZA."},{"p":"5) QUAIS SÃO OS NOMES ORIGINAIS DA METODOLOGIA 5S?","r":"1. SEIRI; 2. SEITON; 3. SEISO; 4. SEIKETSU; 5. SHITSUKE."}],"COMO PRIORIZAR TAREFAS":[{"p":"1) Por que é importante sabermos priorizar nossas tarefas?","r":"Para alcançarmos nossas metas e objetivos."},{"p":"2) Qual o primeiro passo no processo de priorização de tarefas?","r":"O primeiro passo é listar todas as suas tarefas e identificar as mais importantes."},{"p":"3) Devemos priorizar as tarefas com base na urgência ou na importância?","r":"Devemos priorizar as tarefas com base na importância em relação aos seus objetivos."},{"p":"4) O que devemos fazer antes de aceitar novos projetos?","r":"Antes de aceitar novos projetos devemos avaliar se essa tarefa irá prejudicar nosso planejamento, resultando no atraso de nossas entregas."},{"p":"5) Qual é a técnica de gestão de tempo que é citada no treinamento?","r":"Técnica Pomodoro, que ensina a focar em uma tarefa por determinado tempo e tirar 5 minutos de pausa."}],"JULHO AMARELO_PREVENÇÃO HEPATITES":[{"p":"1) QUAL A FINALIDADE DA CAMPANHA?","r":"FINALIDADE DE REFORÇAR AS AÇÕES DE VIGILÂNCIA, PREVENÇÃO E CONTROLE DAS HEPATITES VIRAIS."},{"p":"2) O QUE É A HEPATITE?","r":"É UMA INFLAMAÇÃO DO FÍGADO QUE PODE SER CAUSADA POR VÍRUS OU PELO USO DE ALGUNS MEDICAMENTOS, ÁLCOOL E OUTRAS DROGAS, ASSIM COMO POR DOENÇAS AUTOIMUNES, METABÓLICAS OU GENÉTICAS."},{"p":"3) NEM SEMPRE A DOENÇA APRESENTA SINTOMAS, MAS QUANDO APARECEM, QUAIS SÃO?","r":"CANSAÇO, FEBRE, MAL-ESTAR, TONTURA, ENJOO, VÔMITOS, DOR ABDOMINAL, PELE E OLHOS AMARELADOS, URINA ESCURA E FEZES CLARAS."},{"p":"4) SOBRE A HEPATITE B QUAL É A PRINCIPAL MEDIDA DE PREVENÇÃO?","r":"VACINA É A PRINCIPAL MEDIDA DE PREVENÇÃO, SENDO EFICAZ E SEGURA."},{"p":"5) EXISTE VACINA CONTRA A HEPATITE C?","r":"NÃO EXISTE VACINA PARA HEPATITE C."}],"PREVENÇÃO DE PERÍODO DE FESTAS":[{"p":"1) O que acontece quando nossa atenção está voltada a fatores externos ou não estamos nas melhores condições físicas e psicológicas no trabalho?","r":"Deixamos de perceber os riscos nos ambientes e ficamos vulneráveis a possíveis acidentes e ocorrências"},{"p":"2) Por qual motivo é importante redobrar a atenção aos seus pertences pessoais?","r":"Pois em período de festas o aumento de roubo e furto se intensificam"},{"p":"3) Qual a importância de NÃO usar o celular ao volante?","r":"Todas as alternativas anteriores"},{"p":"4) Quais os cuidados que devo ter ao volante?","r":"Manter uma distância segura do veículo da frente, não utilizar o celular enquanto estou no trajeto, respeitar o limite de velocidade e jamais dirigir embriagado(a)"},{"p":"5) Quais as medidas preventivas que ainda preciso ter por causa da pandemia?","r":"Cumprir os protocolos sanitários e evitar grandes aglomerações"}],"UTILIZAÇÃO DO EPI":[{"p":"1) Qual luva devo utilizar para a coleta de resíduos?","r":"Luva azul."},{"p":"2) O que significa a sigla EPI?","r":"Equipamento de Proteção Individual."},{"p":"3) A utilização do EPI...","r":"É obrigatória, devendo ser utilizado na realização de todas as atividades de limpeza."},{"p":"4) Quando o óculos de segurança deve ser utilizado?","r":"Na limpeza de superfícies aéreas (acima da altura dos meus olhos) para evitar respingos e poeira."},{"p":"5) Quais os cuidados na conservação dos EPIs?","r":"No final do turno de trabalho guardar os EPIs limpos, higienizados e separados."}],"VALORES GPS_DISCIPLINA":[{"p":"1) Para o que serve as Normas e Procedimentos?","r":"Serve como bússola e como uma diretriz para que você seja guiado de forma segura."},{"p":"2) Quais são os benefícios que geramos aplicando na prática a Disciplina?","r":"Eficiência, eficácia e efetividade."},{"p":"3) Qual o benefício da eficiência?","r":"Manter o foco nos custos envolvidos e evitando desperdícios, usando apenas os recursos disponíveis."},{"p":"4) Qual o benefício da eficácia?","r":"Mantém sua atenção no resultado do que está sendo produzido e na qualidade final."},{"p":"5) O que é Disciplina?","r":"É fazer o que precisa ser feito, com competência e comprometimento necessário."}],"PROCEDIMENTO DE BLOQUEIO, IDENTIFICAÇÃO E TESTE (LOTOTO) - MÓD III_REGIONAL SP":[{"p":"1)  QUAIS SÃO AS CORES DOS CADEADOS MENCIONADOS NO TREINAMENTO?","r":"VERDE, VERMELHO, AMARELO E ROSA."},{"p":"2) QUAL É A FUNÇÃO PRINCIPAL DO BLOQUEIO DE ENERGIA UTILIZANDO CADEADOS?","r":"A FUNÇÃO PRINCIPAL É EVITAR ACIDENTES DE TRABALHO, SINALIZANDO E PREVENINDO O ACESSO DE PROFISSIONAIS AOS EQUIPAMENTOS DESLIGADOS OU EM MANUTENÇÃO."},{"p":"3) ASSINALE A ALTERNATIVA CORRETA. OS COMPORTAMENTOS INACEITÁVEIS RELACIONADOS À SEGURANÇA E AO PROTOCOLO DE BLOQUEIO E ETIQUETAGEM DE ENERGIA SÃO:","r":"TODAS AS ALTERNATIVAS ESTÃO CORRETAS."},{"p":"4) CONFORME O TREINAMENTO, O QUE OS TRABALHADORES DEVEM FAZER EM CASO DE DÚVIDAS OU SITUAÇÕES DE RISCO RELACIONADAS AO BLOQUEIO DE ENERGIA?","r":"OS TRABALHADORES DEVEM INTERROMPER SUAS ATIVIDADES E PROCURAR AJUDA COM SEU SUPERIOR IMEDIATO PARA ESCLARECER DÚVIDAS OU LIDAR COM SITUAÇÕES DE RISCO."},{"p":"5) QUAL COR DE CADEADO REPRESENTA A EQUIPE DE MANUTENÇÃO ELÉTRICA?","r":"CADEADO VERMELHO."}],"DIREITO DE RECUSA NA EXECUÇÃO DA ATIVIDADE":[{"p":"1) QUANDO VOCÊ PODE RECUSAR EM REALIZAR UMA ATIVIDADE?","r":"QUANDO A ATIVIDADE PODE IMPACTAR NEGATIVAMENTE SUA INTEGRIDADE FÍSICA, SAÚDE MENTAL OU QUE CARACTERIZE DESVIO DE FUNÇÃO."},{"p":"2) O QUE É IMPORTANTE SABER PARA QUE POSSA EFETUAR A RECUSA DE UMA ATIVIDADE?","r":"É IMPORTANTE SABER SOBRE SEU CARGO E SUAS ATIVIDADES, E SABER FAZER A ANÁLISE DE RISCO."},{"p":"3) ALEGAR QUE A ATIVIDADE NÃO FAZ PARTE DO SEU ESCOPO DE TRABALHO, É O SUFICIENTE PARA RECUSAR REALIZA-LA?","r":"NÃO, PARA A RECUSA SER LEGÍTIMA, É NECESSÁRIO QUE A TAREFA APRESENTE RISCOS CONCRETOS E SUBSTANCIAIS AO COLABORADOR."},{"p":"4) QUANDO A RECUSA NÃO VAI TE CAUSAR NENHUMA INFRAÇÃO?","r":"QUANDO A ATIVIDADE EXPOR O COLABORADOR A RISCOS DE SAÚDE E SEGURANÇA."},{"p":"5) É IMPORTANTE RESSALTAR QUE O DIREITO DE RECUSA DEVE SER EXERCIDO COM:","r":"CAUTELA E CONSCIÊNCIA."}],"PROCEDIMENTO DE BLOQUEIO, IDENTIFICAÇÃO E TESTE (LOTOTO) - MÓD II_REGIONAL SP":[{"p":"1) QUANTOS PASSOS SÃO NECESSÁRIOS PARA O CONTROLE DE ENERGIAS?","r":"SÃO NECESSÁRIOS 6 PASSOS."},{"p":"2) CONFORME O TREINAMENTO, IDENTIFIQUE OS PROCEDIMENTOS MENCIONADOS PARA UM PROCESSO SEGURO:","r":"IDENTIFICAR AS ENERGIAS, DESLIGAR/DESENERGIZAR, BLOQUEAR/ETIQUETAR, LIBERAR AS ENERGIAS RESIDUAIS, VERIFICAR/TESTAR, BLOQUEIO E ETIQUETAGEM."},{"p":"3) QUAL É O TERCEIRO PASSO DO PROCEDIMENTO DE SEGURANÇA LOTOTO?","r":"PROCEDIMENTO DE DESLIGAMENTO."},{"p":"4) QUAL É O OBJETIVO DE IDENTIFICAR AS CORES DOS CADEADOS?","r":"O OBJETIVO É IDENTIFICAR QUAL EQUIPE ESTÁ FAZENDO A INTERVENÇÃO NO EQUIPAMENTO APENAS OLHANDO A COR DO CADEADO."},{"p":"5) QUAL É A FUNÇÃO DO DIE (DISPOSITIVO DE ISOLAMENTO DE ENERGIA)?","r":"É GARANTIR QUE AS FONTES DE ENERGIA EM UM EQUIPAMENTO OU MÁQUINA SEJAM ISOLADAS DE FORMA SEGURA DURANTE TRABALHOS DE MANUTENÇÃO, REPARO, INSPEÇÃO, ETC."}],"PROCEDIMENTO DE BLOQUEIO, IDENTIFICAÇÃO E TESTE (LOTOTO)- MÓD I_REGIONAL SP":[{"p":"1)  O QUE SIGNIFICA LOCK-OUT, TAG-OUT E TEST-OUT?","r":"SIGNIFICA BLOQUEAR, SINALIZAR E TESTAR O BLOQUEIO."},{"p":"2)  CONFORME TREINAMENTO O QUE É  FEITO NO LOCK-OUT NO PROCEDIMENTO LOTO?","r":"LOCK-OUT ENVOLVE O DESLIGAMENTO FÍSICO DE UMA FONTE DE ENERGIA PERIGOSA E A APLICAÇÃO DE DISPOSITIVOS DE BLOQUEIO, COMO CADEADOS, PARA EVITAR SUA REENERGIZAÇÃO ACIDENTAL."},{"p":"3) QUAIS NR’S SÃO CITADAS NO TREINAMENTO, PARA O BLOQUEIO E ETIQUETAGEM DE ENERGIAS PERIGOSAS?","r":"SÃO CITADAS AS NR'S 12 E 10."},{"p":"4) QUEM DEVE SER TREINADO NO PROCEDIMENTO LOTOTO?","r":"TODOS OS FUNCIONÁRIOS ENVOLVIDOS EM TRABALHOS DE MANUTENÇÃO."},{"p":"5) CONFORME O TREINAMENTO, QUAIS SÃO OS TIPOS DE ENERGIAS PERIGOSAS QUE PODEM CAUSAR DANOS FÍSICOS?","r":"ENERGIA ELÉTRICA, ENERGIA MECÂNICA, ENERGIA HIDRÁULICA, ENERGIA PNEUMÁTICA, ENERGIA TÉRMICA, ENERGIA QUÍMICA."}],"ATITUDE POSITIVA":[{"p" a sugerir infecção."},{"p":"4) Quem devemos procurar para realizar o tratamento de IST's?","r":"Clínico Geral."}],"A IMPORTÂNCIA DO EXERCÍCIO FÍSICO NA QUALIDADE DE VIDA_SAÚDE":[{"p":"1) PARA CONTRIBUIR COM NOSSA SAÚDE, QUANTOS QUILÔMETROS DEVEMOS CAMINHAR POR SEMANA?","r":"ENTRE 15 KM A 24 KM."},{"p":"2)  O QUE É QUALIDADE DE VIDA?","r":"QUALIDADE DE VIDA É O BEM-ESTAR FÍSICO, MENTAL E SOCIAL."},{"p":"3)  PARA TERMOS UM SONO DE QUALIDADE DEVEMOS DORMIR QUANTAS HORAS?","r":"DE 7:00 A 8:00 HRS."},{"p":"4) ASSINALE A ALTERNATIVA CORRETA. PARA A CAMINHADA SER UTILIZADA COMO EXERCÍCIO, ELA DEVE SER:","r":"ACELERADA/RÁPIDA."},{"p":"5) QUAIS SÃO OS BENEFÍCIOS QUE A PRÁTICA DA MUSCULAÇÃO PODE TRAZER À NOSSA SAÚDE?","r":"CONTRIBUI COM O AUMENTO DOS MÚSCULOS, FORÇA E NO TRATAMENTO DE DOENÇAS."}],"FEBRE MACULOSA_O QUE É E COMO SE PREVENIR":[{"p":"1) O QUE É FEBRE MACULOSA?","r":"A FEBRE MACULOSA, TAMBÉM CONHECIDA COMO FEBRE DO CARRAPATO, É UMA DOENÇA INFECCIOSA CAUSADA PELA BACTÉRIA RICKETTSIA RICKETTSII."},{"p":"2) COMO A FEBRE MACULOSA É CONTRAÍDA?","r":"A TRANSMISSÃO DA DOENÇA OCORRE QUANDO UM CARRAPATO INFECTADO PICA UMA PESSOA E A BACTÉRIA RICKETTSIA RICKETTSII ENTRA NA CORRENTE SANGUÍNEA."},{"p":"3) EM QUANTO TEMPO OS SINTOMAS DA FEBRE MACULOSA PODEM APARECER?","r":"DE 2 A 14 DIAS APÓS A PICADA DO CARRAPATO INFECTADO."},{"p":"4) ASSINALE ABAIXO A ALTERNATIVA QUE CONTÉM OS SINTOMAS DA FEBRE MACULOSA:","r":"FEBRE ALTA, DOR DE CABEÇA INTENSA, DORES MUSCULARES E ARTICULARES, NÁUSEAS, VÔMITOS, DIARREIA E ERUPÇÃO CUTÂNEA CARACTERÍSTICA."},{"p":"5) QUAL A FORMA CORRETA DE REMOVER O CARRAPATO DA PELE?","r":"UTILIZANDO UMA PINÇA. NUNCA APERTE OU ESMAGUE O CARRAPATO."}],"A IMPORTÂNCIA DE DORMIR BEM":[{"p":"1) A falta de sono prejudica a produção de qual hormônio?","r":"Melatonina."},{"p":"2) O treinamento cita que a falta de sono pode ocasionar diversos problemas de saúde. Qual foi um dos problemas mencionados?","r":"Problemas no coração."},{"p":"3) Quem dorme mal tem mais chance const TEMAS = Object.keys(D).sort();
const TAGS = ['Saúde','Segurança','Ética','EPI','Diversidade','Acidente','Sustentabilidade','LGPD','Canal','Assédio'];

const tagsEl = document.getElementById('tags');
TAGS.forEach(t => {
  const el = document.createElement('div');
  el.className = 'tag'; el.textContent = t;
  el.onclick = () => { document.getElementById('searchInput').value = t; render(t); };
  tagsEl.appendChild(el);
});

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hi(s, q) {
  if (!q) return esc(s);
  return esc(s).replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>');
}

function render(query) {
  const q = (query || '').trim();
  const qlo = q.toLowerCase();
  document.getElementById('clearBtn').className = q ? 'clear-btn show' : 'clear-btn';

  const filtered = q
    ? TEMAS.filter(t => t.toLowerCase().includes(qlo) ||
        D[t].some(x => x.p.toLowerCase().includes(qlo) || x.r.toLowerCase().includes(qlo)))
    : TEMAS;

  document.getElementById('info').innerHTML = filtered.length
    ? `Mostrando <span>${filtered.length}</span> de ${TEMAS.length} treinamentos`
    : '';

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><h3>Nenhum resultado encontrado</h3><p>Tente outra palavra-chave</p></div>';
    return;
  }

  list.innerHTML = filtered.map((tema, i) => {
    const pergs = D[tema];
    return `<div class="card" onclick="toggle(this)">
      <div class="card-header">
        <div class="card-idx">${String(i+1).padStart(2,'0')}</div>
        <div class="card-name">${hi(tema, q)}</div>
        <div class="card-badge">${pergs.length} pergunta${pergs.length > 1 ? 's' : ''}</div>
        <div class="card-arrow">▾</div>
      </div>
      <div class="card-body">
        <hr class="card-divider">
        <div class="questions">
          ${pergs.map(x => `
            <div class="q">
              <div class="q-text">${hi(x.p, q)}</div>
              <div class="q-ans"><span class="q-check">✓</span><span class="q-ans-text">${hi(x.r, q)}</span></div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(card) {
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) card.classList.add('open');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  render('');
  document.getElementById('searchInput').focus();
}

let timer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(timer);
  timer = setTimeout(() => render(e.target.value), 150);
});

render('');
</script>

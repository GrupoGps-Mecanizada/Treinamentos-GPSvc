<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>GPS — Gabarito</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#eef0f4;--surface:#fff;
  --accent:#1e40af;--accent2:#3b82f6;--accent-dim:#dbeafe;
  --green:#16a34a;--green-dim:#dcfce7;--green-bd:#86efac;
  --text:#0f172a;--sub:#475569;--muted:#94a3b8;
  --border:#e2e8f0;--radius:14px;
  --shadow:0 2px 8px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 16px rgba(15,23,42,.12),0 2px 4px rgba(15,23,42,.06);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 60%,#2563eb 100%);
  padding:14px 16px 12px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(30,58,138,.35);
}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.brand-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.06em}
.header-title{font-size:18px;font-weight:700;color:#fff;margin-left:auto}
.total-badge{background:rgba(255,255,255,.2);border-radius:100px;padding:3px 11px;font-size:11px;color:#fff;white-space:nowrap}

/* search */
.search-wrap{position:relative}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:rgba(255,255,255,.6);pointer-events:none}
#searchInput{
  width:100%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);
  border-radius:10px;padding:10px 38px 10px 36px;
  font:400 14px Arial,sans-serif;color:#fff;outline:none;-webkit-appearance:none;
}
#searchInput::placeholder{color:rgba(255,255,255,.5)}
#searchInput:focus{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
.clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.25);border:none;border-radius:6px;color:#fff;cursor:pointer;padding:3px 9px;font-size:11px;display:none}
.clr.on{display:block}

/* ── WRAP ── */
.wrap{max-width:520px;margin:0 auto;padding:12px 12px 100px}

/* tags */
.tags{display:flex;gap:6px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}
.tags::-webkit-scrollbar{display:none}
.tag{
  background:var(--surface);border:1.5px solid var(--border);border-radius:100px;
  padding:5px 14px;font-size:12px;font-weight:600;color:var(--sub);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.tag.active,.tag:active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* info bar */
.info{font-size:12px;color:var(--muted);margin:8px 0 10px;display:flex;justify-content:space-between;align-items:center}
.info b{color:var(--accent);font-weight:700}

/* ── CARD ── */
.card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
  overflow:hidden;box-shadow:var(--shadow);
  transition:border-color .15s,box-shadow .15s;
}
.card.open{border-color:var(--accent2);box-shadow:var(--shadow-md),0 0 0 3px var(--accent-dim)}

.card-head{display:flex;align-items:center;padding:13px 14px;cursor:pointer;gap:10px;user-select:none}

.card-seq{
  flex-shrink:0;min-width:30px;height:30px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
}
.card.open .card-seq{background:linear-gradient(135deg,#16a34a,#22c55e)}

.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.card.open .card-name{color:var(--accent)}
.card-meta{font-size:11px;color:var(--muted);margin-top:2px}

.card-arr{color:var(--muted);font-size:12px;flex-shrink:0;transition:transform .22s}
.card.open .card-arr{transform:rotate(180deg);color:var(--accent)}

/* body */
.card-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.card.open .card-body{max-height:6000px}
.qs-wrap{border-top:1.5px solid var(--border);padding:14px 14px 16px}

/* question item */
.q-item{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.q-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}

.q-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.q-num{
  flex-shrink:0;width:22px;height:22px;border-radius:6px;
  background:var(--accent-dim);color:var(--accent);
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.q-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.45;flex:1}

/* answer — ONLY correct answer shown */
.answer-box{
  display:flex;align-items:flex-start;gap:9px;
  background:var(--green-dim);border:1.5px solid var(--green-bd);
  border-radius:10px;padding:9px 12px;
}
.ans-icon{
  flex-shrink:0;width:20px;height:20px;border-radius:50%;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;margin-top:1px;
}

.ans-text{font-size:13px;font-weight:600;color:#14532d;line-height:1.4;flex:1}

/* empty / loading */
.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty-ico{font-size:40px;margin-bottom:14px;opacity:.45}
.empty h3{font-size:15px;color:var(--sub);margin-bottom:6px;font-weight:700}
.empty p{font-size:13px}

/* ── BOTTOM NAV ── */
.nav-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1.5px solid var(--border);
  padding:10px 14px env(safe-area-inset-bottom,4px);
  display:none;gap:8px;z-index:200;
  box-shadow:0 -4px 20px rgba(15,23,42,.08);
}
.nav-bar.show{display:flex}
.nav-btn{
  flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:11px 8px;font:700 13px Arial,sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background .1s;
}
.nav-btn:active{background:#1e3a8a}
.nav-btn:disabled{background:var(--border);color:var(--muted);cursor:default}
.nav-btn.x-btn{flex:0 0 46px;background:var(--bg);color:var(--sub);border:1.5px solid var(--border);font-size:16px;padding:11px 0}
.nav-btn.x-btn:active{background:#e2e8f0}

/* highlight */
mark{background:#fef08a;color:#713f12;border-radius:2px;padding:0 2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="brand-badge">GPS</span>
    <span class="header-title">Gabarito</span>
    <span class="total-badge" id="totalChip">…</span>
  </div>
  <div class="search-wrap">
    <span class="s-ico">&#128269;</span>
    <input id="searchInput" type="search" placeholder="Buscar treinamento..." autocomplete="off" autocorrect="off" autocapitalize="off">
    <button class="clr" id="clrBtn" onclick="clearSearch()">&#10005;</button>
  </div>
  <div style="text-align:right;margin-top:6px;font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.02em">Desenvolvido por Warlison Abreu &mdash; Mecanizada</div>
</div>

<div class="wrap">
  <div class="tags" id="tagsEl"></div>
  <div class="info">
    <span id="infoCount"></span>
    <span id="infoLabel" style="color:var(--accent);font-weight:600"></span>
  </div>
  <div id="listEl"><div class="empty"><div class="empty-ico">&#8987;</div><h3>Carregando...</h3></div></div>
</div>

<div class="nav-bar" id="navBar">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592; Anterior</button>
  <button class="nav-btn x-btn" onclick="closeActive()">&#10005;</button>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Pr&#243;ximo &#8594;</button>
</div>

<script src="data.js"></script>
<script>
// ── HELPERS ──
function qNum(p){ var m=String(p).match(/^(\d+)\)/); return m?parseInt(m[1]):99; }
function sortQs(qs){ return qs.slice().sort(function(a,b){return qNum(a.p)-qNum(b.p);}); }
// letter of correct answer among options (A/B/C/D)
function correctLetter(item){
  if(!item.o||!item.o.length) return '?';
  for(var i=0;i<item.o.length;i++){
    if(item.o[i]===item.r) return String.fromCharCode(65+i); // A,B,C,D
  }
  return 'A'; // fallback
}

// ── STATE ──
var ALL=[], filtered=[], activeIdx=-1, activeTag='', searchQ='', timer;
var TAG_PRESET=['SEGURANÇA','SAÚDE','INFRA','LIDERANÇA','ALIMENTAÇÃO','ENGENHARIA','LGPD','CIPA','GPSVISTA','NOVELIS'];

// ── BOOT ──
(function(){
  if(!window.DATA||!window.DATA.length){
    document.getElementById('listEl').innerHTML='<div class="empty"><div class="empty-ico">&#9888;</div><h3>Execute generate_data.ps1 primeiro</h3><p>O arquivo data.js precisa ser gerado.</p></div>';
    return;
  }
  ALL=window.DATA;
  document.getElementById('totalChip').textContent=ALL.length+' treinamentos';
  buildTags();
  applyFilters();
  document.getElementById('searchInput').addEventListener('input',function(e){
    clearTimeout(timer);
    timer=setTimeout(function(){doSearch(e.target.value);},200);
  });
})();

// ── TAGS ──
function buildTags(){
  var el=document.getElementById('tagsEl'), h='';
  TAG_PRESET.forEach(function(t){
    h+='<div class="tag" onclick="toggleTag(this,\''+t+'\')">'+t+'</div>';
  });
  el.innerHTML=h;
}
function toggleTag(el,tag){
  if(activeTag===tag){activeTag='';el.classList.remove('active');}
  else{activeTag=tag;document.querySelectorAll('.tag').forEach(function(t){t.classList.remove('active');});el.classList.add('active');}
  closeActive();applyFilters();
}

// ── SEARCH ──
function doSearch(v){
  searchQ=v.trim();
  document.getElementById('clrBtn').className=searchQ?'clr on':'clr';
  closeActive();applyFilters();
}
function clearSearch(){document.getElementById('searchInput').value='';doSearch('');}

// ── FILTER ──
function applyFilters(){
  var q=searchQ.toLowerCase();
  filtered=ALL.filter(function(t){
    var ok=!activeTag||(t.tag&&t.tag.toUpperCase().indexOf(activeTag)!==-1)||t.nome.toUpperCase().indexOf(activeTag)!==-1;
    if(!ok)return false;
    if(!q)return true;
    if(t.nome.toLowerCase().indexOf(q)!==-1)return true;
    for(var i=0;i<t.qs.length;i++){if(t.qs[i].p.toLowerCase().indexOf(q)!==-1||t.qs[i].r.toLowerCase().indexOf(q)!==-1)return true;}
    return false;
  });
  render();
}

// ── RENDER LIST ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hi(s,q){
  if(!q)return esc(s);
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(s).replace(re,'<mark>$1</mark>');
}

function render(){
  var n=filtered.length,q=searchQ.toLowerCase();
  document.getElementById('infoCount').innerHTML='<b>'+n+'</b> de '+ALL.length;
  document.getElementById('infoLabel').textContent=activeTag?'#'+activeTag:(searchQ?'"'+searchQ+'"':'');
  var el=document.getElementById('listEl');
  if(!n){el.innerHTML='<div class="empty"><div class="empty-ico">&#128269;</div><h3>Nenhum resultado</h3><p>Tente outra palavra-chave</p></div>';return;}
  var h='';
  for(var i=0;i<n;i++){
    var t=filtered[i],num=String(i+1).padStart(2,'0'),tagShort=t.tag?t.tag.substring(0,14):'',qCount=t.qs?t.qs.length:0;
    h+='<div class="card" id="c'+i+'" onclick="toggle('+i+',event)">';
    h+='<div class="card-head">';
    h+='<div class="card-seq">'+num+'</div>';
    h+='<div class="card-info"><div class="card-name">'+hi(t.nome,q)+'</div>';
    h+='<div class="card-meta">'+(tagShort?tagShort:'')+'</div></div>';
    h+='<span class="card-arr">&#9660;</span></div>';
    h+='<div class="card-body"><div class="qs-wrap" id="qs'+i+'">&#8230;</div></div></div>';
  }
  el.innerHTML=h;
}

// ── QUESTIONS (lazy) ──
function loadQs(idx){
  var el=document.getElementById('qs'+idx);
  if(!el||el.dataset.loaded)return;
  var t=filtered[idx],q=searchQ.toLowerCase();
  var sorted=sortQs(t.qs||[]);
  var h='';
  sorted.forEach(function(item,i){
    var letter=correctLetter(item);
    var cleanQ=item.p.replace(/^\d+\)\s*/,''); // remove leading "1) "
    h+='<div class="q-item">';
    h+='<div class="q-header"><div class="q-num">'+(i+1)+'</div><div class="q-text">'+hi(cleanQ,q)+'</div></div>';
    h+='<div class="answer-box">';
    h+='<div class="ans-icon">&#10003;</div>';
    h+='<div class="ans-text">'+hi(item.r,q)+'</div>';
    h+='</div></div>';
  });
  el.innerHTML=h||'<p style="color:var(--muted);font-size:12px">Sem perguntas.</p>';
  el.dataset.loaded='1';
}

// ── TOGGLE ──
function toggle(idx,e){
  if(e&&e.target&&(e.target.classList.contains('ans-text')||e.target.classList.contains('answer-box')))return;
  var card=document.getElementById('c'+idx);
  if(!card)return;
  var open=card.classList.contains('open');
  if(activeIdx>=0&&activeIdx!==idx){var p=document.getElementById('c'+activeIdx);if(p)p.classList.remove('open');}
  if(open){card.classList.remove('open');activeIdx=-1;}
  else{card.classList.add('open');activeIdx=idx;loadQs(idx);setTimeout(function(){card.scrollIntoView({behavior:'smooth',block:'start'});},80);}
  updateNav();
}

// ── NAV ──
function updateNav(){
  var bar=document.getElementById('navBar');
  if(activeIdx<0){bar.className='nav-bar';return;}
  bar.className='nav-bar show';
  document.getElementById('prevBtn').disabled=(activeIdx===0);
  document.getElementById('nextBtn').disabled=(activeIdx===filtered.length-1);
}
function navigate(dir){
  var nx=activeIdx+dir;
  if(nx<0||nx>=filtered.length)return;
  var cur=document.getElementById('c'+activeIdx);if(cur)cur.classList.remove('open');
  activeIdx=nx;
  var nc=document.getElementById('c'+nx);if(!nc)return;
  nc.classList.add('open');loadQs(nx);updateNav();
  setTimeout(function(){nc.scrollIntoView({behavior:'smooth',block:'start'});},60);
}
function closeActive(){
  if(activeIdx>=0){var c=document.getElementById('c'+activeIdx);if(c)c.classList.remove('open');}
  activeIdx=-1;updateNav();
}
</script>
</body>
</html>
